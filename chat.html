<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chat</title>
<meta name="theme-color" content="#4f46e5">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #4f46e5;
    --primary-light: #818cf8;
    --primary-dark: #3730a3;
    --bg: #f1f5f9;
    --surface: #ffffff;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,0.12);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --bubble-me: #4f46e5;
    --bubble-them: #e2e8f0;
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
  .screen.active { display: flex; }

  /* ===== SETUP SCREEN ===== */
  #setup-screen {
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: linear-gradient(160deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
  }
  .setup-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: var(--shadow-md);
  }
  .setup-logo {
    text-align: center;
    margin-bottom: 24px;
  }
  .setup-logo svg { width: 56px; height: 56px; }
  .setup-logo h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-top: 8px; }
  .setup-logo p { color: var(--text-secondary); font-size: 0.875rem; margin-top: 4px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  .form-group input {
    width: 100%; padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 1rem; color: var(--text);
    outline: none; transition: border-color 0.2s;
    background: var(--surface);
  }
  .form-group input:focus { border-color: var(--primary); }
  .form-group input::placeholder { color: #aaa; }
  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white; border: none; border-radius: var(--radius-sm);
    font-size: 1rem; font-weight: 600; cursor: pointer;
    margin-top: 8px; transition: opacity 0.2s;
    letter-spacing: 0.02em;
  }
  .btn-primary:active { opacity: 0.85; }
  .peer-id-display {
    margin-top: 18px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 0.8125rem;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.5;
    word-break: break-all;
  }
  .peer-id-display strong { color: var(--primary); }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .status-dot.connecting { background: #f59e0b; animation: pulse 1.2s infinite; }
  .status-dot.online { background: #10b981; }
  .status-dot.offline { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  /* ===== CHAT SCREEN ===== */
  #chat-screen { background: var(--bg); }
  .chat-header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
    min-height: 60px;
  }
  .btn-back {
    background: rgba(255,255,255,0.18);
    border: none; color: white;
    width: 36px; height: 36px;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .btn-back:active { background: rgba(255,255,255,0.3); }
  .chat-header-info { flex: 1; min-width: 0; }
  .chat-header-info .peer-name { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-header-info .conn-status { font-size: 0.75rem; opacity: 0.85; display: flex; align-items: center; gap: 4px; margin-top: 1px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1.1rem;
    flex-shrink: 0;
  }

  /* ===== MESSAGES ===== */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    -webkit-overflow-scrolling: touch;
  }
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
  }
  .msg-row.me { flex-direction: row-reverse; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; color: white;
    flex-shrink: 0; margin-bottom: 2px;
  }
  .msg-row.me .msg-avatar { background: var(--primary-dark); }
  .msg-bubble {
    max-width: 100%;
    padding: 9px 13px;
    border-radius: 18px;
    font-size: 0.9375rem;
    line-height: 1.45;
    word-break: break-word;
    position: relative;
  }
  .msg-row.me .msg-bubble {
    background: var(--bubble-me);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg-row.them .msg-bubble {
    background: var(--bubble-them);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg-bubble img {
    max-width: 100%;
    max-height: 260px;
    border-radius: 10px;
    display: block;
    cursor: pointer;
  }
  .msg-time {
    font-size: 0.6875rem;
    color: var(--text-secondary);
    margin-top: 2px;
    padding: 0 4px;
    text-align: right;
  }
  .msg-row.them .msg-time { text-align: left; }
  .msg-group { display: flex; flex-direction: column; max-width: 75%; }
  .msg-row.me .msg-group { align-items: flex-end; }
  .msg-row.them .msg-group { align-items: flex-start; }

  .date-divider {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin: 8px 0;
    display: flex; align-items: center; gap: 8px;
  }
  .date-divider::before, .date-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .system-msg {
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-secondary);
    padding: 4px 10px;
    background: rgba(0,0,0,0.05);
    border-radius: 20px;
    align-self: center;
    max-width: 80%;
  }

  /* ===== INPUT AREA ===== */
  .chat-bottom {
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  /* Emoji picker row */
  .emoji-row {
    display: none;
    padding: 8px 10px;
    gap: 4px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    max-height: 150px;
    overflow-y: auto;
  }
  .emoji-row.open { display: flex; }
  .emoji-btn-item {
    font-size: 1.5rem;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    line-height: 1;
    transition: transform 0.1s;
  }
  .emoji-btn-item:active { transform: scale(1.3); }

  .input-row {
    display: flex;
    align-items: flex-end;
    padding: 8px 10px;
    gap: 6px;
  }
  .icon-btn {
    background: none; border: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-btn:active, .icon-btn.active { background: var(--bg); color: var(--primary); }
  .icon-btn svg { width: 22px; height: 22px; pointer-events: none; }

  #msg-input {
    flex: 1;
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 9px 14px;
    font-size: 0.9375rem;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.2s;
  }
  #msg-input:focus { border-color: var(--primary); background: var(--surface); }
  #msg-input::placeholder { color: #aaa; }

  #send-btn {
    background: var(--primary);
    border: none; border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    color: white; cursor: pointer; flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
  #send-btn:active { opacity: 0.8; transform: scale(0.93); }
  #send-btn svg { width: 20px; height: 20px; }

  #file-input { display: none; }

  /* ===== IMAGE LIGHTBOX ===== */
  #lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; }
  #lightbox-close {
    position: absolute; top: 14px; right: 14px;
    background: rgba(255,255,255,0.15); border: none;
    color: white; width: 36px; height: 36px;
    border-radius: 50%; font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(30,41,59,0.9); color: white;
    padding: 9px 18px; border-radius: 20px;
    font-size: 0.85rem; white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    z-index: 100;
  }
  #toast.show { opacity: 1; }

  /* ===== SCROLLBAR ===== */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup-screen" class="screen active">
  <div class="setup-card">
    <div class="setup-logo">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="56" height="56" rx="16" fill="#4f46e5"/>
        <path d="M14 18C14 15.8 15.8 14 18 14H38C40.2 14 42 15.8 42 18V30C42 32.2 40.2 34 38 34H30L22 42V34H18C15.8 34 14 32.2 14 30V18Z" fill="white" fill-opacity="0.9"/>
        <circle cx="21" cy="24" r="2.5" fill="#4f46e5"/>
        <circle cx="28" cy="24" r="2.5" fill="#4f46e5"/>
        <circle cx="35" cy="24" r="2.5" fill="#4f46e5"/>
      </svg>
      <h1>PeerChat</h1>
      <p>Trò chuyện trực tiếp, riêng tư</p>

    <div class="peer-id-display" id="status-info" style="display:none">

      <span id="status-text">Đang khởi tạo...</span>
    </div>
  </div>
</div>

<!-- ===== CHAT SCREEN ===== -->
<div id="chat-screen" class="screen">
  <div class="chat-header">
    <button class="btn-back" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="avatar" id="peer-avatar">?</div>
    <div class="chat-header-info">
      <div class="peer-name" id="header-peer-name">...</div>
      <div class="conn-status">
        <span class="status-dot" id="header-status-dot"></span>
        <span id="header-status-text">Đang kết nối...</span>
      </div>
    </div>
  </div>

  <div id="messages"></div>

  <div class="chat-bottom">
    <div class="emoji-row" id="emoji-row"></div>
    <div class="input-row">
      <button class="icon-btn" id="emoji-toggle-btn" title="Emoji" onclick="toggleEmoji()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </button>
      <button class="icon-btn" title="Gửi ảnh" onclick="document.getElementById('file-input').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>

          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <input type="file" id="file-input" accept="image/*" onchange="handleFileInput(event)">
      <textarea id="msg-input" rows="1" placeholder="Nhắn tin..." maxlength="4000"
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendText()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ===== SUPABASE CONFIG =====
// 1. Vào project Supabase > Settings > API, copy "Project URL" và "anon public" key vào đây
// 2. Vào Realtime > Configuration, đảm bảo Broadcast và Presence đã được bật
const SUPABASE_URL = 'https://ihnysophoizwiuddivbw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlobnlzb3Bob2l6d2l1ZGRpdmJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MzgxMzMsImV4cCI6MjA5MjQxNDEzM30.3d8wh7m-Pnu-CNP2T-Qh3XwrDIbduddI9lpVDRqQpjM';

// ===== CONSTANTS =====
const MAX_HISTORY = 500;
const MAX_STORAGE_BYTES = 4 * 1024 * 1024; // 4 MB
// Giới hạn ảnh gửi qua Supabase Broadcast (~200 KB sau base64 overhead)
const IMG_MAX_PX = 800;
const IMG_QUALITY = 0.72;
const IMG_MAX_B64 = 200 * 1024;

// ===== EMOJI LIST =====
const EMOJIS = [
  '😀','😂','🥹','😍','🥰','😘','😎','🤩','😜','🤪','😅','😭','😤','🥺','😱',
  '🤔','🤗','😴','🤢','🥳','👍','👎','👏','🙌','🤝','❤️','🧡','💛','💚','💙',
  '💜','🖤','🤍','💔','💯','🔥','⭐','✨','🎉','🎊','🎈','🎁','🏆','💪','🙏',
  '👀','💀','🤦','🤷','🫡','🫶','🫂','😋','🤤','😏','😒','🙄','😩','😫','😡',
  '🤬','🥱','😶','🫠','🫣','🫤','🤥','😔','😕','🙃','😑','😐','🫡','🤓','👾',
  '🐶','🐱','🐭','🐹','🐼','🐨','🦁','🐯','🐻','🐸','🐙','🦋','🌸','🌺','🌻',
  '🌈','⚡','🌙','☀️','❄️','🍕','🍔','🍜','🍰','🎂','🍺','☕','🧋','🥤','🍹'
];

// ===== SUPABASE CLIENT =====
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== STATE =====
let myNick = '', peerNick = '';
let channel = null;
let isConnected = false;
const STORAGE_KEY_PREFIX = 'peerchat_';
let storageKey = '';
let lastDateLabel = '';

// ===== SETUP =====
function startConnection() {
  myNick = document.getElementById('my-nick').value.trim();
  peerNick = document.getElementById('peer-nick').value.trim();
  if (!myNick) { showToast('Vui lòng nhập biệt danh của bạn'); return; }
  if (!peerNick) { showToast('Vui lòng nhập biệt danh người kia'); return; }
  if (myNick === peerNick) { showToast('Biệt danh của bạn và người kia phải khác nhau'); return; }

  // Derive a stable channel name from both nicks (same regardless of who initiates)
  const myKey = nickToKey(myNick);
  const peerKey = nickToKey(peerNick);
  const channelName = 'chat__' + [myKey, peerKey].sort().join('__');
  storageKey = STORAGE_KEY_PREFIX + channelName;

  document.getElementById('connect-btn').disabled = true;
  document.getElementById('status-info').style.display = '';
  setStatus('connecting', 'Đang kết nối đến máy chủ...');

  // Remove previous channel if any
  if (channel) {
    channel.untrack();
    sb.removeChannel(channel);
    channel = null;
  }

  // Presence key must be a stable string (URL-safe nick key)
  channel = sb.channel(channelName, {
    config: {
      broadcast: { self: false, ack: false },
      presence: { key: myKey }
    }
  });

  channel
    .on('broadcast', { event: 'msg' }, ({ payload }) => {
      handleIncoming(payload);
    })
    .on('presence', { event: 'sync' }, () => {
      refreshPresence();
    })
    .on('presence', { event: 'join' }, ({ newPresences }) => {
      // Show system message when peer joins
      if (newPresences && newPresences.some(p => p.nick === peerNick)) {
        addSystemMsg(`${peerNick} đã tham gia cuộc trò chuyện 👋`);
      }
      refreshPresence();
    })
    .on('presence', { event: 'leave' }, ({ leftPresences }) => {
      if (leftPresences && leftPresences.some(p => p.nick === peerNick)) {
        addSystemMsg(`${peerNick} đã rời cuộc trò chuyện`);
      }
      refreshPresence();
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        setStatus('online', 'Đã kết nối máy chủ');
        // Track our presence with actual nick in payload
        await channel.track({ nick: myNick });
        openChatScreen();
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        setStatus('offline', 'Lỗi kết nối, thử lại...');
        document.getElementById('connect-btn').disabled = false;
      }
    });
}

function nickToKey(nick) {
  // Derive a URL-safe, stable key from a nickname
  return nick.toLowerCase().replace(/[^a-z0-9]/g, '_').slice(0, 30) +
    '_' + simpleHash(nick).toString(16).slice(0, 6);
}

function simpleHash(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return h;
}

function refreshPresence() {
  if (!channel) return;
  const state = channel.presenceState();
  // Each value is an array of presences for that key; check if peer's nick is present
  const peerPresent = Object.values(state).flat().some(p => p.nick === peerNick);
  isConnected = peerPresent;
  if (peerPresent) {
    updateHeaderStatus('online', 'Đã kết nối');
  } else {
    updateHeaderStatus('connecting', `Đang chờ ${peerNick}...`);
  }
}

function openChatScreen() {
  document.getElementById('setup-screen').classList.remove('active');
  document.getElementById('chat-screen').classList.add('active');

  document.getElementById('header-peer-name').textContent = peerNick;
  document.getElementById('peer-avatar').textContent = peerNick.charAt(0).toUpperCase();
  updateHeaderStatus('connecting', `Đang chờ ${peerNick}...`);

  buildEmojiPicker();
  loadMessages();
}

function updateHeaderStatus(state, text) {
  const dot = document.getElementById('header-status-dot');
  dot.className = 'status-dot ' + state;
  document.getElementById('header-status-text').textContent = text;
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function goBack() {
  document.getElementById('chat-screen').classList.remove('active');
  document.getElementById('setup-screen').classList.add('active');
  document.getElementById('connect-btn').disabled = false;
  document.getElementById('status-info').style.display = 'none';
  isConnected = false;
  if (channel) {
    channel.untrack();
    sb.removeChannel(channel);
    channel = null;
  }
}

// ===== INCOMING MESSAGES =====
function handleIncoming(data) {
  if (!data || !data.type) return;
  if (data.type === 'text' || data.type === 'image') {
    const msg = {
      id: data.id || genId(),
      from: 'them',
      type: data.type,
      content: data.content,
      time: data.time || Date.now()
    };
    saveMessage(msg);
    renderMessage(msg);
    scrollToBottom();
  }
}

// ===== SEND =====
function sendText() {
  const textarea = document.getElementById('msg-input');
  const text = textarea.value.trim();
  if (!text) return;
  if (!isConnected) { showToast('Bạn chat chưa kết nối'); return; }

  const msg = { id: genId(), from: 'me', type: 'text', content: text, time: Date.now() };
  saveMessage(msg);
  renderMessage(msg);
  scrollToBottom();

  channel.send({
    type: 'broadcast',
    event: 'msg',
    payload: { type: 'text', id: msg.id, content: text, time: msg.time }
  });

  textarea.value = '';
  textarea.style.height = '';
}

function sendImage(dataUrl) {
  if (!isConnected) { showToast('Bạn chat chưa kết nối'); return; }

  // Guard: base64 string too large for Supabase Broadcast free tier
  if (dataUrl.length > IMG_MAX_B64 * 1.4) {
    showToast('Ảnh quá lớn để gửi, hãy chọn ảnh nhỏ hơn');
    return;
  }

  const msg = { id: genId(), from: 'me', type: 'image', content: dataUrl, time: Date.now() };
  saveMessage(msg);
  renderMessage(msg);
  scrollToBottom();

  channel.send({
    type: 'broadcast',
    event: 'msg',
    payload: { type: 'image', id: msg.id, content: dataUrl, time: msg.time }
  });
}

// ===== FILE INPUT =====
function handleFileInput(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('Chỉ hỗ trợ ảnh'); return; }
  readImageFile(file);
  e.target.value = '';
}

function readImageFile(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    compressImage(ev.target.result, IMG_MAX_PX, IMG_QUALITY, (dataUrl) => {
      sendImage(dataUrl);
    });
  };
  reader.readAsDataURL(file);
}

function compressImage(dataUrl, maxSize, quality, cb) {
  const img = new Image();
  img.onload = () => {
    let { width, height } = img;
    if (width > maxSize || height > maxSize) {
      if (width > height) { height = Math.round(height * maxSize / width); width = maxSize; }
      else { width = Math.round(width * maxSize / height); height = maxSize; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = width; canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, width, height);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

// ===== PASTE (clipboard image) =====
document.addEventListener('paste', (e) => {
  const chatScreen = document.getElementById('chat-screen');
  if (!chatScreen.classList.contains('active')) return;
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      if (blob) readImageFile(blob);
      break;
    }
  }
});

// ===== EMOJI =====
function buildEmojiPicker() {
  const row = document.getElementById('emoji-row');
  row.innerHTML = '';
  EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn-item';
    btn.textContent = em;
    btn.addEventListener('click', () => insertEmoji(em));
    row.appendChild(btn);
  });
}

function toggleEmoji() {
  const row = document.getElementById('emoji-row');
  const btn = document.getElementById('emoji-toggle-btn');
  row.classList.toggle('open');
  btn.classList.toggle('active');
}

function insertEmoji(em) {
  const ta = document.getElementById('msg-input');
  const start = ta.selectionStart, end = ta.selectionEnd;
  const val = ta.value;
  ta.value = val.slice(0, start) + em + val.slice(end);
  ta.selectionStart = ta.selectionEnd = start + em.length;
  ta.focus();
  autoResize(ta);
}

// ===== TEXTAREA HELPERS =====
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  // On mobile, Enter adds newline; on desktop Enter (without Shift) sends
  if (e.key === 'Enter' && !e.shiftKey && !('ontouchstart' in window)) {
    e.preventDefault();
    sendText();
  }
}

// ===== STORAGE =====
function saveMessage(msg) {
  try {
    const history = loadHistory();
    history.push(msg);
    // Keep last 500 messages; avoid overflowing localStorage
    const trimmed = history.slice(-MAX_HISTORY);
    // Strip image data if storage is getting large
    let serialized = JSON.stringify(trimmed);
    if (serialized.length > MAX_STORAGE_BYTES) {
      // Remove oldest image messages until under limit
      let i = 0;
      while (serialized.length > MAX_STORAGE_BYTES && i < trimmed.length) {
        if (trimmed[i].type === 'image') trimmed[i].content = '[image]';
        serialized = JSON.stringify(trimmed);
        i++;
      }
    }
    localStorage.setItem(storageKey, serialized);
  } catch(e) {
    console.warn('Storage error', e);
  }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(storageKey);
    if (!raw) return [];
    return JSON.parse(raw) || [];
  } catch(e) { return []; }
}

function loadMessages() {
  const history = loadHistory();
  const container = document.getElementById('messages');
  container.innerHTML = '';
  lastDateLabel = '';
  if (history.length === 0) {
    addSystemMsg('Bắt đầu cuộc trò chuyện 👋');
  } else {
    history.forEach(msg => renderMessage(msg, true));
    scrollToBottom(true);
  }
}

// ===== RENDER =====
function renderMessage(msg, noScroll) {
  const container = document.getElementById('messages');

  // Date divider
  const dateLabel = formatDate(msg.time);
  if (dateLabel !== lastDateLabel) {
    lastDateLabel = dateLabel;
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.textContent = dateLabel;
    container.appendChild(div);
  }

  const isMe = msg.from === 'me';
  const nick = isMe ? myNick : peerNick;
  const initials = nick.charAt(0).toUpperCase();

  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMe ? 'me' : 'them');

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = initials;

  const group = document.createElement('div');
  group.className = 'msg-group';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (msg.type === 'text') {
    bubble.textContent = msg.content;
  } else if (msg.type === 'image') {
    if (msg.content === '[image]') {
      bubble.textContent = '📷 [Ảnh không còn lưu]';
    } else {
      const imgEl = document.createElement('img');
      imgEl.src = msg.content;
      imgEl.alt = 'Ảnh';
      imgEl.loading = 'lazy';
      imgEl.onclick = () => openLightbox(msg.content);
      bubble.appendChild(imgEl);
      bubble.style.padding = '4px';
      bubble.style.background = isMe ? 'rgba(79,70,229,0.15)' : 'transparent';
    }
  }

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = formatTime(msg.time);

  group.appendChild(bubble);
  group.appendChild(timeEl);
  row.appendChild(avatarEl);
  row.appendChild(group);
  container.appendChild(row);
}

function addSystemMsg(text) {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'system-msg';
  el.textContent = text;
  container.appendChild(el);
}

function scrollToBottom(instant) {
  const c = document.getElementById('messages');
  if (instant) { c.scrollTop = c.scrollHeight; return; }
  requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
}

// ===== LIGHTBOX =====
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

// ===== TOAST =====
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== UTILS =====
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
  const ny = now.getFullYear(), nm = now.getMonth(), nd = now.getDate();
  if (y === ny && m === nm && day === nd) return 'Hôm nay';
  if (y === ny && m === nm && day === nd - 1) return 'Hôm qua';
  return `${day.toString().padStart(2,'0')}/${(m+1).toString().padStart(2,'0')}/${y}`;
}

// ===== RESTORE SETUP FROM STORAGE =====
(function() {
  const saved = localStorage.getItem('peerchat_myNick');
  const savedPeer = localStorage.getItem('peerchat_peerNick');
  if (saved) document.getElementById('my-nick').value = saved;
  if (savedPeer) document.getElementById('peer-nick').value = savedPeer;
})();

document.getElementById('my-nick').addEventListener('input', function() {
  localStorage.setItem('peerchat_myNick', this.value.trim());
});
document.getElementById('peer-nick').addEventListener('input', function() {
  localStorage.setItem('peerchat_peerNick', this.value.trim());
});

// Clean up presence on page close/reload
window.addEventListener('beforeunload', () => {
  if (channel) channel.untrack();
});
</script>
